<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charmora — Shop by Category</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
<style>

  /* ===========================================================
     CHARMORA — CATEGORY SHOWCASE
     Drop this whole file's <style>, HTML body content and
     <script> into your homepage. Swap the --img values inside
     each .cc-card style="" attribute with real product photos.
     =========================================================== */

  :root{
    --ivory:      #FBF3EC;
    --plum:       #2E1626;
    --plum-soft:  #4A3140;
    --mauve:      #B4677A;
    --mauve-deep: #8C4A5B;
    --gold:       #C9A24E;
    --gold-light: #E7D6A8;
    --blush:      #F3DCE1;
    --ease: cubic-bezier(.22,.9,.3,1);
  }

  .charmora-categories{
    background: var(--ivory);
    padding: 88px 24px;
    font-family: 'Jost', sans-serif;
    color: var(--plum);
    overflow: hidden;
  }

  .cc-inner{
    max-width: 1180px;
    margin: 0 auto;
  }

  .cc-header{
    text-align: center;
    margin-bottom: 56px;
    opacity: 0;
    transform: translateY(18px);
    transition: opacity .8s var(--ease), transform .8s var(--ease);
  }
  .cc-header.is-visible{ opacity: 1; transform: translateY(0); }

  .cc-eyebrow{
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    letter-spacing: .28em;
    text-transform: uppercase;
    color: var(--mauve-deep);
    margin: 0 0 14px;
    font-weight: 500;
  }
  .cc-eyebrow::before,
  .cc-eyebrow::after{
    content:"";
    width: 26px;
    height: 1px;
    background: var(--gold);
  }

  .cc-heading{
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: clamp(34px, 5vw, 54px);
    line-height: 1.1;
    margin: 0 0 14px;
    letter-spacing: .01em;
  }
  .cc-heading em{
    font-style: italic;
    color: var(--mauve);
    font-weight: 500;
  }

  .cc-sub{
    max-width: 480px;
    margin: 0 auto;
    font-size: 15.5px;
    line-height: 1.7;
    color: var(--plum-soft);
    font-weight: 400;
  }

  /* ---------- GRID ---------- */

  .cc-grid{
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-auto-rows: auto;
    gap: 18px;
  }

  .cc-card{
    position: relative;
    aspect-ratio: 1 / 1;
    border-radius: 22px;
    overflow: hidden;
    display: block;
    text-decoration: none;
    color: #fff;
    isolation: isolate;
    cursor: pointer;
    opacity: 0;
    transform: translateY(28px);
    transition: opacity .7s var(--ease), transform .7s var(--ease),
                box-shadow .45s var(--ease);
    box-shadow: 0 0 0 rgba(46,22,38,0);
  }
  .cc-card.is-visible{ opacity: 1; transform: translateY(0); }
  .cc-card:nth-child(1){ transition-delay: .02s; }
  .cc-card:nth-child(2){ transition-delay: .12s; }
  .cc-card:nth-child(3){ transition-delay: .22s; }
  .cc-card:nth-child(4){ transition-delay: .32s; }
  .cc-card:nth-child(5){ transition-delay: .42s; }

  .cc-hero{ grid-column: span 2; grid-row: span 2; }

  @media (max-width: 720px){
    .cc-grid{ grid-template-columns: repeat(2, 1fr); gap: 14px; }
    .cc-hero{ grid-column: span 2; grid-row: span 2; }
  }

  /* ---------- CARD MEDIA (swap --img for real photos) ---------- */

  .cc-media{
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(155deg, rgba(46,22,38,.12) 0%, rgba(46,22,38,.55) 100%),
      var(--img);
    background-size: cover;
    background-position: center;
    transform: scale(1.08);
    transition: transform .9s var(--ease), filter .9s var(--ease);
  }
  .cc-card:hover .cc-media{ transform: scale(1.18) rotate(.4deg); }

  .cc-icon-wrap{
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: .5;
    transform: scale(1);
    transition: transform .9s var(--ease), opacity .5s var(--ease);
  }
  .cc-card:hover .cc-icon-wrap{ transform: scale(1.1) rotate(-3deg); opacity: .32; }
  .cc-icon-wrap svg{ width: 34%; height: 34%; }
  .cc-hero .cc-icon-wrap svg{ width: 26%; height: 26%; }

  /* gold shimmer sweep on hover */
  .cc-shine{
    position: absolute;
    inset: 0;
    background: linear-gradient(115deg, transparent 40%, rgba(231,214,168,.55) 50%, transparent 60%);
    transform: translateX(-120%);
    z-index: 3;
    pointer-events: none;
  }
  .cc-card:hover .cc-shine{ animation: shineSweep 1.1s var(--ease); }
  @keyframes shineSweep{
    to{ transform: translateX(120%); }
  }

  /* ---------- hanging charm tag ---------- */

  .cc-tag{
    position: absolute;
    top: 14px;
    left: 18px;
    z-index: 4;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px 6px 10px;
    background: var(--ivory);
    color: var(--plum);
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .05em;
    text-transform: uppercase;
    border-radius: 3px 9px 9px 3px;
    box-shadow: 0 6px 14px rgba(46,22,38,.22);
    transform-origin: top left;
    animation: sway 4.5s ease-in-out infinite;
  }
  .cc-tag::before{
    content:"";
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--ivory);
    border: 1.5px solid var(--plum);
  }
  .cc-tag::after{
    content:"";
    position: absolute;
    left: 4px;
    top: -9px;
    width: 1px;
    height: 9px;
    background: rgba(46,22,38,.5);
  }
  .cc-card:hover .cc-tag{ animation: swayHover .6s ease-in-out; }

  @keyframes sway{
    0%,100%{ transform: rotate(-3deg); }
    50%{ transform: rotate(3deg); }
  }
  @keyframes swayHover{
    0%{ transform: rotate(-3deg); }
    30%{ transform: rotate(9deg); }
    60%{ transform: rotate(-7deg); }
    100%{ transform: rotate(-3deg); }
  }

  /* ---------- info block ---------- */

  .cc-info{
    position: absolute;
    left: 0; right: 0; bottom: 0;
    z-index: 3;
    padding: 22px 22px 24px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 10px;
  }
  .cc-hero .cc-info{ padding: 30px 30px 32px; }

  .cc-info-text h3{
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 24px;
    margin: 0 0 4px;
    letter-spacing: .01em;
  }
  .cc-hero .cc-info-text h3{ font-size: 36px; }

  .cc-count{
    font-size: 11.5px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--gold-light);
    font-weight: 500;
  }

  .cc-arrow{
    flex-shrink: 0;
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,.55);
    display: flex;
    align-items: center;
    justify-content: center;
    transform: translateX(0) rotate(0deg);
    transition: transform .45s var(--ease), background .45s var(--ease), border-color .45s var(--ease);
  }
  .cc-arrow svg{ width: 15px; height: 15px; transition: transform .45s var(--ease); }
  .cc-card:hover .cc-arrow{
    background: var(--gold);
    border-color: var(--gold);
    transform: rotate(45deg);
  }
  .cc-card:hover .cc-arrow svg{ transform: rotate(-45deg); }

  /* reduced motion */
  @media (prefers-reduced-motion: reduce){
    .cc-card, .cc-header, .cc-media, .cc-icon-wrap, .cc-arrow, .cc-tag{
      transition: none !important;
      animation: none !important;
    }
  }

</style>
</head>
<body style="margin:0;">

<section class="charmora-categories">
  <div class="cc-inner">

    <div class="cc-header" data-reveal>
      <p class="cc-eyebrow">Shop by category</p>
      <h2 class="cc-heading">Every piece, <em>perfectly you</em></h2>
      <p class="cc-sub">Handcrafted in small batches — browse the collection the way you'd browse a jewelry box.</p>
    </div>

    <div class="cc-grid">

      <!-- HERO: Bracelets -->
      <a href="/shop?category=bracelets" class="cc-card cc-hero" data-reveal
         style="--img: linear-gradient(150deg, #8C4A5B, #C9A24E);">
        <div class="cc-media"></div>
        <div class="cc-icon-wrap">
          <svg viewBox="0 0 64 64" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round">
            <circle cx="32" cy="32" r="21"/>
            <circle cx="32" cy="11" r="3.4" fill="#fff" stroke="none"/>
            <circle cx="49" cy="21" r="3.4" fill="#fff" stroke="none"/>
            <circle cx="49" cy="43" r="3.4" fill="#fff" stroke="none"/>
            <circle cx="32" cy="53" r="3.4" fill="#fff" stroke="none"/>
            <circle cx="15" cy="43" r="3.4" fill="#fff" stroke="none"/>
            <circle cx="15" cy="21" r="3.4" fill="#fff" stroke="none"/>
          </svg>
        </div>
        <div class="cc-shine"></div>
        <span class="cc-tag">Bestseller</span>
        <div class="cc-info">
          <div class="cc-info-text">
            <h3>Bracelets</h3>
            <span class="cc-count">2 pieces</span>
          </div>
          <span class="cc-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="19" x2="19" y2="5"/><polyline points="8 5 19 5 19 16"/></svg>
          </span>
        </div>
      </a>

      <!-- Necklaces -->
      <a href="/shop?category=necklaces" class="cc-card" data-reveal
         style="--img: linear-gradient(150deg, #4A3140, #B4677A);">
        <div class="cc-media"></div>
        <div class="cc-icon-wrap">
          <svg viewBox="0 0 64 64" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round">
            <path d="M12 14c0 14 9 24 20 24s20-10 20-24"/>
            <circle cx="32" cy="44" r="5" fill="#fff" stroke="none"/>
          </svg>
        </div>
        <div class="cc-shine"></div>
        <span class="cc-tag">New in</span>
        <div class="cc-info">
          <div class="cc-info-text">
            <h3>Necklaces</h3>
            <span class="cc-count">1 piece</span>
          </div>
          <span class="cc-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="19" x2="19" y2="5"/><polyline points="8 5 19 5 19 16"/></svg>
          </span>
        </div>
      </a>

      <!-- Earrings -->
      <a href="/shop?category=earrings" class="cc-card" data-reveal
         style="--img: linear-gradient(150deg, #2E1626, #8C4A5B);">
        <div class="cc-media"></div>
        <div class="cc-icon-wrap">
          <svg viewBox="0 0 64 64" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round">
            <circle cx="32" cy="14" r="5"/>
            <path d="M32 19v10c0 8 6 14 6 20a6 6 0 1 1-12 0"/>
          </svg>
        </div>
        <div class="cc-shine"></div>
        <span class="cc-tag">Loved</span>
        <div class="cc-info">
          <div class="cc-info-text">
            <h3>Earrings</h3>
            <span class="cc-count">1 piece</span>
          </div>
          <span class="cc-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="19" x2="19" y2="5"/><polyline points="8 5 19 5 19 16"/></svg>
          </span>
        </div>
      </a>

      <!-- Hair Accessories -->
      <a href="/shop?category=hair-accessories" class="cc-card" data-reveal
         style="--img: linear-gradient(150deg, #B4677A, #E7D6A8);">
        <div class="cc-media"></div>
        <div class="cc-icon-wrap">
          <svg viewBox="0 0 64 64" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 32c0-8 6-14 14-14s14 6 14 14-6 14-14 14"/>
            <path d="M46 32c0-8-6-14-14-14"/>
            <circle cx="18" cy="32" r="4" fill="#fff" stroke="none"/>
          </svg>
        </div>
        <div class="cc-shine"></div>
        <div class="cc-info">
          <div class="cc-info-text">
            <h3>Hair pieces</h3>
            <span class="cc-count">2 pieces</span>
          </div>
          <span class="cc-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="19" x2="19" y2="5"/><polyline points="8 5 19 5 19 16"/></svg>
          </span>
        </div>
      </a>

      <!-- Beads -->
      <a href="/shop?category=beads" class="cc-card" data-reveal
         style="--img: linear-gradient(150deg, #C9A24E, #4A3140);">
        <div class="cc-media"></div>
        <div class="cc-icon-wrap">
          <svg viewBox="0 0 64 64" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round">
            <circle cx="16" cy="20" r="6"/>
            <circle cx="34" cy="14" r="4"/>
            <circle cx="48" cy="26" r="7"/>
            <circle cx="22" cy="40" r="5"/>
            <circle cx="40" cy="44" r="6"/>
          </svg>
        </div>
        <div class="cc-shine"></div>
        <div class="cc-info">
          <div class="cc-info-text">
            <h3>Beads</h3>
            <span class="cc-count">Coming soon</span>
          </div>
          <span class="cc-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="19" x2="19" y2="5"/><polyline points="8 5 19 5 19 16"/></svg>
          </span>
        </div>
      </a>

    </div>
  </div>
</section>

<script>
  (function(){
    var targets = document.querySelectorAll('[data-reveal]');
    if(!('IntersectionObserver' in window)){
      targets.forEach(function(el){ el.classList.add('is-visible'); });
      return;
    }
    var io = new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        if(entry.isIntersecting){
          entry.target.classList.add('is-visible');
          io.unobserve(entry.target);
        }
      });
    }, { threshold: 0.15 });
    targets.forEach(function(el){ io.observe(el); });
  })();
</script>

</body>
</html>
